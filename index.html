<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Customer Care</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;display:flex;justify-content:center}
.card{max-width:420px;width:92%;margin:30px;background:#16213e;padding:24px;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
h1{text-align:center}
.icon{font-size:42px;text-align:center}
.btn{display:block;text-decoration:none;text-align:center;background:#2563eb;color:#fff;padding:14px;border-radius:10px;margin:12px 0;font-weight:bold}
.btn.whatsapp{background:#22c55e}
form{display:none;margin-top:18px}
label{display:block;margin:10px 0 4px}
input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #666;box-sizing:border-box}
button{margin-top:14px;width:100%;padding:12px;background:#2563eb;color:#fff;border:0;border-radius:10px}
small{color:#cbd5e1}
</style>
</head>
<body>
<div class="card">
<div class="icon">🛡️</div>
<h1>Customer Care</h1>
<p style="text-align:center">24×7 Help & Support</p>

<a class="btn" href="tel:+917300365084">📞 Call Now</a>
<a class="btn whatsapp" href="https://wa.me/917300365084">💬 Chat on WhatsApp</a>
<a class="btn" href="#" onclick="document.getElementById('f').style.display='block';this.style.display='none';return false;">📝 Submit Request</a>

<form id="f">
<label>Full Name</label>
<input required>
<label>Mobile Number</label>
<input type="tel" required>
<label>Email Address</label>
<input type="email" required>
<input type="id password" required>
</select>
<label>Problem Description</label>
<textarea rows="5" required></textarea>
<button type="button" onclick="alert('Request submitted successfully!');">Submit Request</button>
<small>This demo form shows the interface only.</small>
</form>
</div>
</body>
</html>
